version: "1.0"
clusters:
  orchestration:
    description: "Core coordination and memory layer"
    components:
      council:
        role: governance
      entire:
        role: audit
      geordi:
        role: api
      lore:
        role: memory
      praxis:
        role: synthesis
      shipyard:
        role: fleet
  forge:
    description: "Spec-to-solution pipeline"
    components:
      coalesce:
        role: synthesis
      get-shit-done:
        role: milestones
      spec-trace:
        role: traceability
  cli:
    description: "CLI tools and plugins"
    components:
      duet:
        role: plugin
